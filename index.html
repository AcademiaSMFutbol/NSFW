<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSFW Simple Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #111; color: #eee; }
    .img-container { max-width: 100%; margin: 20px auto; }
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-2xl mx-auto text-center">
    <h1 class="text-4xl font-bold mb-6 text-pink-500">🔞 NSFW Generator Simple</h1>
    <p class="mb-8 text-zinc-400">Escribe lo que quieras (sin censura) y pulsa Generar</p>

    <textarea id="prompt" rows="5"
      class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-5 text-lg focus:outline-none focus:border-pink-500"
      placeholder="Mujer desnuda realista, piel húmeda, pose sensual, detalles ultra realistas, iluminación suave..."></textarea>

    <div class="mt-6 flex gap-4 justify-center">
      <button onclick="generate()" 
        class="bg-pink-600 hover:bg-pink-700 px-10 py-4 rounded-2xl font-bold text-xl transition">
        Generar Imagen NSFW
      </button>
      <button onclick="clearAll()" 
        class="bg-zinc-700 hover:bg-zinc-600 px-6 py-4 rounded-2xl font-bold transition">
        Limpiar
      </button>
    </div>

    <div id="loading" class="hidden mt-8 text-pink-400 text-xl">Generando... (puede tardar unos segundos)</div>

    <div id="result" class="mt-10 img-container"></div>

    <p class="text-xs text-zinc-500 mt-12">
      Gratuito • Sin registro • Ilimitado • Totalmente sin censura (usa Perchance AI)
    </p>
  </div>

  <script>
    async function generate() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) {
        alert("¡Escribe algo en el prompt!");
        return;
      }

      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('result').innerHTML = '';

      // URL directa de Perchance (funciona sin API key)
      const url = `https://perchance.org/api/aiTextToImage?prompt=${encodeURIComponent(prompt)}&style=Realistic%20Humans&nsfw=1`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (data && data.images && data.images.length > 0) {
          const imgUrl = data.images[0].url || data.images[0];

          const img = document.createElement('img');
          img.src = imgUrl;
          img.className = "rounded-3xl shadow-2xl max-w-full border border-zinc-700";
          img.alt = prompt;

          document.getElementById('result').appendChild(img);

          // Botón para descargar
          const downloadBtn = document.createElement('button');
          downloadBtn.textContent = "⬇️ Descargar imagen";
          downloadBtn.className = "mt-6 bg-zinc-800 hover:bg-zinc-700 px-8 py-3 rounded-xl transition";
          downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = imgUrl;
            a.download = "nsfw-image.png";
            a.click();
          };
          document.getElementById('result').appendChild(downloadBtn);
        } else {
          document.getElementById('result').innerHTML = `<p class="text-red-400">No se pudo generar la imagen. Inténtalo de nuevo.</p>`;
        }
      } catch (e) {
        console.error(e);
        document.getElementById('result').innerHTML = `<p class="text-red-400">Error de conexión. Prueba más tarde o usa otro generador.</p>`;
      }

      document.getElementById('loading').classList.add('hidden');
    }

    function clearAll() {
      document.getElementById('prompt').value = '';
      document.getElementById('result').innerHTML = '';
    }

    // Atajo: presiona Enter en el textarea para generar
    document.getElementById('prompt').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        generate();
      }
    });
  </script>
</body>
</html>
